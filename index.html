<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الصور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6; /* Tailwind blue-500 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 sm:p-8 flex items-center justify-center">

    <div class="max-w-xl w-full bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-100">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 mb-2">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-500 ml-2"></i>
                أداة التعديل الذكية
            </h1>
            <p class="text-slate-500 text-sm sm:text-base">قم برفع الصورة لنقوم برفع جودتها وإزالة الأشخاص الجانبيين بالذكاء الاصطناعي.</p>
        </div>

        <!-- Upload Area -->
        <label for="imageInput" class="upload-area flex flex-col items-center justify-center w-full h-48 rounded-xl cursor-pointer bg-slate-50 mb-6 relative overflow-hidden group">
            <div class="flex flex-col items-center justify-center pt-5 pb-6 z-10">
                <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-400 mb-3 group-hover:text-blue-500 transition-colors"></i>
                <p class="mb-2 text-sm text-slate-500 font-semibold">اضغط هنا لرفع الصورة</p>
                <p class="text-xs text-slate-400">JPG, PNG (الحد الأقصى 5MB)</p>
            </div>
            <input id="imageInput" type="file" class="hidden" accept="image/*" />
            <img id="preview" class="absolute inset-0 w-full h-full object-contain bg-black/5 hidden z-20" alt="Preview">
        </label>

        <!-- Message Box -->
        <div id="messageBox" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium"></div>

        <!-- Action Button -->
        <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2 disabled:bg-slate-400 disabled:shadow-none disabled:cursor-not-allowed">
            <i class="fa-solid fa-crop-simple"></i>
            تحسين الصورة وإزالة الشخص
        </button>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden flex-col items-center justify-center mt-8 p-6 bg-slate-50 rounded-xl border border-slate-100">
            <div class="loader mb-4"></div>
            <p class="text-slate-600 font-medium animate-pulse">جاري المعالجة بالذكاء الاصطناعي...</p>
            <p class="text-slate-400 text-xs mt-1">قد يستغرق الأمر من 10 إلى 20 ثانية</p>
        </div>

        <!-- Result Area -->
        <div id="resultArea" class="hidden mt-8 text-center animate-fade-in">
            <h2 class="text-lg font-bold text-slate-700 mb-4 border-b pb-2">النتيجة النهائية</h2>
            <div class="relative rounded-xl overflow-hidden shadow-md border border-slate-200 mb-4 bg-slate-100">
                <img id="resultImage" class="w-full h-auto object-contain max-h-96" alt="Enhanced Result">
            </div>
            <a id="downloadBtn" href="#" download="enhanced_image.png" class="inline-flex justify-center items-center w-full sm:w-auto bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-green-500/30 gap-2">
                <i class="fa-solid fa-download"></i>
                تحميل الصورة
            </a>
        </div>

    </div>

    <script>
        const apiKey = ""; // Provided by execution environment
        let base64Image = "";
        
        const fileInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');
        const resultImage = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const messageBox = document.getElementById('messageBox');

        function showMessage(msg, type = 'error') {
            messageBox.textContent = msg;
            messageBox.className = `mb-4 p-3 rounded-lg text-sm text-center font-medium ${type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-blue-50 text-blue-600 border border-blue-200'}`;
            messageBox.classList.remove('hidden');
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        // Handle Image Selection
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            hideMessage();
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    // Extract only the base64 data string
                    base64Image = e.target.result.split(',')[1];
                    // Reset UI
                    resultArea.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Exponential backoff logic for API call
        async function callGeminiAPI(retries = 5) {
            // Precise prompt to achieve user's goal
            const promptText = "Enhance the overall image quality, make it high resolution and clear. Carefully remove the person partially visible on the left side of the frame. The final image should only feature the main child in the center. Ensure the background where the person was removed is filled in seamlessly and naturally.";

            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }],
                generationConfig: {
                    responseModalities: ['TEXT', 'IMAGE']
                }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const result = await response.json();
                    
                    // Extract image from response
                    const base64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                    if (base64) {
                        return `data:image/jpeg;base64,${base64}`;
                    } else {
                         throw new Error("لم يتم إرجاع بيانات صورة من الخادم.");
                    }

                } catch (error) {
                    if (i === retries - 1) throw error;
                    // Exponential backoff: 1s, 2s, 4s, 8s, 16s
                    await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
            }
        }

        // Handle Process Button Click
        processBtn.addEventListener('click', async () => {
            if (!base64Image) {
                showMessage("الرجاء اختيار صورة من جهازك أولاً.");
                return;
            }

            hideMessage();
            processBtn.disabled = true;
            loading.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const finalImageUrl = await callGeminiAPI();
                resultImage.src = finalImageUrl;
                downloadBtn.href = finalImageUrl;
                resultArea.classList.remove('hidden');
                showMessage("تم تعديل الصورة بنجاح!", "success");
            } catch (error) {
                console.error(error);
                showMessage("حدث خطأ أثناء معالجة الصورة. يرجى التأكد من اتصالك بالإنترنت والمحاولة مرة أخرى.");
            } finally {
                processBtn.disabled = false;
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
